# =============================================================================
# Alembic config for AutoTreeGen.
# Migration scripts live in infrastructure/alembic/versions/.
# DATABASE_URL is read from environment in env.py (override of sqlalchemy.url).
# Comments kept ASCII-only because alembic reads this file with the system
# locale codec (cp1252 on Windows), which trips on non-ASCII characters.
# =============================================================================

[alembic]
script_location = infrastructure/alembic
prepend_sys_path = .
path_separator = os
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC
; sqlalchemy.url is a fallback when DATABASE_URL is not set in the environment.
; The real URL is provided via environment variable in env.py (see process_revision_directives).
; Login/password here are local dev values, not secrets. pragma: allowlist secret
sqlalchemy.url = postgresql+psycopg://autotreegen:autotreegen@localhost:5432/autotreegen
version_path_separator = os
output_encoding = utf-8

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
ke
