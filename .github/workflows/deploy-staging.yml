name: Deploy staging

# Build images, push to Artifact Registry, deploy to Cloud Run on push to main.
# Gated on `lint-and-test` (CI workflow) — `workflow_run` waits for it to pass.
#
# Auth: Workload Identity Federation (recommended) — operator must configure
#       once via the README in infrastructure/terraform/. Falls back to
#       GOOGLE_CREDENTIALS JSON if WIF is not set up.
#
# Required GitHub repository secrets (one of these auth options):
#   - GCP_WORKLOAD_IDENTITY_PROVIDER  (preferred — no long-lived keys)
#   - GCP_DEPLOY_SA_EMAIL             (paired with WIF)
#   - GCP_CREDENTIALS_JSON            (fallback — service account key JSON)
#
# Required repo *variables*:
#   - GCP_PROJECT_ID
#   - GCP_REGION                       e.g. europe-west1
#   - GCP_ARTIFACT_REGISTRY_REPO       e.g. autotreegen
#
# This workflow does NOT run terraform — Terraform is owner-applied.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    # Only run if the upstream CI succeeded (workflow_run fires on success and failure).
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main')

    env:
      PROJECT_ID:    ${{ vars.GCP_PROJECT_ID }}
      REGION:        ${{ vars.GCP_REGION }}
      AR_REPO:       ${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}

    strategy:
      fail-fast: false
      matrix:
        # Each entry maps service short name → Dockerfile path → Cloud Run service name.
        include:
          - name: parser-service
            dockerfile: services/parser-service/Dockerfile
            cloud_run: staging-parser-service
          - name: dna-service
            dockerfile: services/dna-service/Dockerfile
            cloud_run: staging-dna-service
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
            cloud_run: staging-notification-service
          - name: web
            dockerfile: apps/web/Dockerfile
            cloud_run: staging-web

    steps:
      - uses: actions/checkout@v4

      # Auth — prefer Workload Identity Federation (no long-lived keys).
      - name: Authenticate to GCP (WIF)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA_EMAIL }}

      - name: Authenticate to GCP (SA key fallback)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Image tag = commit SHA for reproducibility + `latest` for convenience.
      - name: Compute image refs
        id: refs
        run: |
          set -euo pipefail
          BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${{ matrix.name }}"
          echo "image_sha=${BASE}:${GITHUB_SHA}"     >> "$GITHUB_OUTPUT"
          echo "image_latest=${BASE}:latest"          >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ steps.refs.outputs.image_sha }}" \
            -t "${{ steps.refs.outputs.image_latest }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.refs.outputs.image_sha }}"
          docker push "${{ steps.refs.outputs.image_latest }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ matrix.cloud_run }}" \
            --region="${REGION}" \
            --image="${{ steps.refs.outputs.image_sha }}" \
            --quiet

  smoke:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP (WIF)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA_EMAIL }}
      - name: Authenticate to GCP (SA key fallback)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - name: Resolve web service URL
        id: weburl
        run: |
          URL=$(gcloud run services describe staging-web \
            --region=${{ vars.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Run smoke test
        run: bash scripts/smoke_test_staging.sh "${{ steps.weburl.outputs.url }}"
