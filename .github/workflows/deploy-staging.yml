name: Deploy staging

# Build images, push to Artifact Registry, deploy to Cloud Run on push to main.
# Gated on `lint-and-test` (CI workflow) — `workflow_run` waits for it to pass.
#
# Auth: Workload Identity Federation only (Phase 13.1 — ADR-0032).
#       No long-lived JSON keys are accepted. The OIDC trust is provisioned
#       by `infrastructure/terraform/modules/gha-oidc/`; first-time setup
#       instructions live in `infrastructure/terraform/README.md` §0.
#
# Required GitHub repository *variables* (Settings → Secrets and variables → Variables):
#   - GCP_PROJECT_ID
#   - GCP_REGION                       e.g. europe-west1
#   - GCP_ARTIFACT_REGISTRY_REPO       e.g. autotreegen
#   - GCP_WORKLOAD_IDENTITY_PROVIDER   full resource name; from terraform output
#                                      `gha_workload_identity_provider`
#   - GCP_DEPLOY_SA_EMAIL              from terraform output
#                                      `gha_deployer_service_account_email`
#
# This workflow does NOT run terraform — Terraform is owner-applied.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required to mint the OIDC token GitHub passes to GCP

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    # Only run if the upstream CI succeeded (workflow_run fires on success and failure).
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main')

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION:     ${{ vars.GCP_REGION }}
      AR_REPO:    ${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}

    strategy:
      fail-fast: false
      matrix:
        # Each entry maps service short name → Dockerfile path → Cloud Run service name.
        include:
          - name: parser-service
            dockerfile: services/parser-service/Dockerfile
            cloud_run: staging-parser-service
          - name: dna-service
            dockerfile: services/dna-service/Dockerfile
            cloud_run: staging-dna-service
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
            cloud_run: staging-notification-service
          - name: web
            dockerfile: apps/web/Dockerfile
            cloud_run: staging-web

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Image tag = commit SHA for reproducibility + `latest` for convenience.
      - name: Compute image refs
        id: refs
        run: |
          set -euo pipefail
          BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${{ matrix.name }}"
          echo "image_sha=${BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${BASE}:latest"     >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ steps.refs.outputs.image_sha }}" \
            -t "${{ steps.refs.outputs.image_latest }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.refs.outputs.image_sha }}"
          docker push "${{ steps.refs.outputs.image_latest }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ matrix.cloud_run }}" \
            --region="${REGION}" \
            --image="${{ steps.refs.outputs.image_sha }}" \
            --quiet

  smoke:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA_EMAIL }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
      - name: Resolve web service URL
        id: weburl
        run: |
          URL=$(gcloud run services describe staging-web \
            --region=${{ vars.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Run smoke test
        run: bash scripts/smoke_test_staging.sh "${{ steps.weburl.outputs.url }}"
