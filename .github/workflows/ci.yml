name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # parser-service requires-python = ">=3.13"; root — ">=3.12". uv по
        # умолчанию ставит latest (видели 3.14 в логах при matrix=3.12, потому
        # что `uv python install 3.12` не пинит интерпретатор для последующих
        # `uv sync` / `uv run`). Фиксируем 3.13 везде через UV_PYTHON.
        python-version: ["3.13"]

    env:
      # Жёстко пинит Python для всех `uv sync` / `uv run` в job'е.
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Установить uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Установить Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Синхронизировать зависимости
        # --all-packages нужен чтобы подтянуть [project.optional-dependencies]
        # из workspace-членов (shared-models, parser-service); без него
        # `--all-extras` применяется только к root-проекту autotreegen.
        run: uv sync --all-extras --all-packages

      - name: Прогнать ruff (lint)
        run: uv run ruff check .

      - name: Прогнать ruff (format check)
        run: uv run ruff format --check .

      - name: Прогнать тесты с coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term

      - name: Загрузить coverage в Codecov (опционально)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
