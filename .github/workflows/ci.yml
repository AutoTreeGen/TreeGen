name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Установить uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Установить Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Синхронизировать зависимости
        run: uv sync --all-extras

      - name: Прогнать ruff (lint)
        run: uv run ruff check .

      - name: Прогнать ruff (format check)
        run: uv run ruff format --check .

      - name: Прогнать тесты с coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term

      - name: Загрузить coverage в Codecov (опционально)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
