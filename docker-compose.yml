# =============================================================================
# AutoTreeGen — локальная инфраструктура для разработки
#
# Поднимает: PostgreSQL 16 (с pgvector), Redis 7, MinIO (S3-совместимый storage).
# Запуск: docker compose up -d
# Сброс:   docker compose down -v
# =============================================================================

name: autotreegen

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # Образ pgvector/pgvector содержит готовое расширение vector.
  # AlloyDB-совместимая схема (используется в проде на GCP, см. ROADMAP §17).
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autotreegen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autotreegen}
      POSTGRES_USER: ${POSTGRES_USER:-autotreegen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local-env}
      # Локализация для корректной сортировки кириллицы/иврита.
      LANG: C.UTF-8
    ports:
      # На хосте мапим на 5433 (5432 часто занят нативно установленным Postgres
      # на dev-машинах разработчика — конфликт ловится через ALTER USER, который
      # уходит «не туда»). Внутри контейнера Postgres всегда на 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autotreegen} -d ${POSTGRES_DB:-autotreegen}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - shared_preload_libraries=vector
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB

  # ---------------------------------------------------------------------------
  # Redis 7 — очереди (arq), кэш, pub/sub.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: autotreegen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-совместимый storage для GEDCOM/DNA/документов.
  # В проде заменяется на Google Cloud Storage (см. ROADMAP §17).
  # Web UI: http://localhost:9001 (login: minioadmin / minioadmin).
  # API:    http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: autotreegen-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # parser-worker — arq-воркер, слушает очередь ``imports`` в Redis.
  # Phase 3.5 (см. ROADMAP §7, ADR-0026). Образ собирается из того же
  # services/parser-service/Dockerfile, что и HTTP-сервис; точка входа
  # переопределяется на ``arq``.
  # ---------------------------------------------------------------------------
  parser-worker:
    build:
      context: .
      dockerfile: services/parser-service/Dockerfile
    container_name: autotreegen-parser-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autotreegen}:${POSTGRES_PASSWORD:-change-me-in-local-env}@postgres:5432/${POSTGRES_DB:-autotreegen}
      PARSER_SERVICE_DEBUG: "false"
    command: ["uv", "run", "arq", "parser_service.worker.WorkerSettings"]

  # ---------------------------------------------------------------------------
  # telegram-bot — Telegram webhook receiver + opt-in linking (Phase 14.0).
  # Webhook URL должен быть HTTPS — поднимай `cloudflared` или `ngrok`
  # локально и регистрируй через `setWebhook` с тем же
  # TELEGRAM_BOT_WEBHOOK_SECRET, который сюда передан. См. ADR-0040.
  # ---------------------------------------------------------------------------
  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    container_name: autotreegen-telegram-bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autotreegen}:${POSTGRES_PASSWORD:-change-me-in-local-env}@postgres:5432/${POSTGRES_DB:-autotreegen}
      TELEGRAM_BOT_REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_WEBHOOK_SECRET: ${TELEGRAM_BOT_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_LINK_TTL_SECONDS: ${TELEGRAM_BOT_LINK_TTL_SECONDS:-900}
      TELEGRAM_BOT_WEB_BASE_URL: ${TELEGRAM_BOT_WEB_BASE_URL:-http://localhost:3000}
      TELEGRAM_BOT_DEBUG: "false"
    ports:
      - "8006:8006"
    command: ["uv", "run", "uvicorn", "telegram_bot.main:app", "--host", "0.0.0.0", "--port", "8006"]

  # ---------------------------------------------------------------------------
  # billing-service — Stripe webhook receiver + checkout session create
  # + subscription state (Phase 12.0, ADR-0042). Подключай Stripe webhook
  # в dev-режиме через `stripe listen --forward-to localhost:8005/billing/webhooks/stripe`.
  # ---------------------------------------------------------------------------
  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: autotreegen-billing-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BILLING_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autotreegen}:${POSTGRES_PASSWORD:-change-me-in-local-env}@postgres:5432/${POSTGRES_DB:-autotreegen}
      BILLING_SERVICE_STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      BILLING_SERVICE_STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BILLING_SERVICE_STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      BILLING_SERVICE_STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      BILLING_SERVICE_EMAIL_SERVICE_URL: ${EMAIL_SERVICE_URL:-http://email-service:8000}
      BILLING_SERVICE_BILLING_ENABLED: ${BILLING_ENABLED:-false}
      BILLING_SERVICE_DEBUG: "false"
    ports:
      - "8005:8005"
    command: ["uv", "run", "uvicorn", "billing_service.main:app", "--host", "0.0.0.0", "--port", "8005"]

  # ---------------------------------------------------------------------------
  # MinIO bucket bootstrapper — однократно создаёт buckets при первом запуске.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: autotreegen-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/gedcom &&
      mc mb --ignore-existing local/dna &&
      mc mb --ignore-existing local/documents &&
      echo 'MinIO buckets ready: gedcom, dna, documents';
      "
    restart: "no"

volumes:
  postgres_data:
    name: autotreegen_postgres_data
  redis_data:
    name: autotreegen_redis_data
  minio_data:
    name: autotreegen_minio_data
