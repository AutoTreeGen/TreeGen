# =============================================================================
# pre-commit hooks для AutoTreeGen.
# Установка:  uv run pre-commit install
# Прогон:     uv run pre-commit run --all-files
# https://pre-commit.com
# =============================================================================

default_language_version:
  python: python3.13

default_stages: [pre-commit]

repos:
  # ---- Базовые проверки ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # `.snap`: vitest сохраняет JSX-текст со значимыми trailing-spaces
        # (видимы в SVG <title>, влияют на a11y screen-reader output).
        # Strip ломает snapshot-equality на следующем `pnpm vitest`.
        exclude: '\.(md|snap)$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: '^.*\.jsonc$'
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # ---- Python: ruff (lint + format) ----
  # Версия pinned под `uv run ruff` из .venv (см. dev-deps), иначе CI и
  # pre-commit формат-чек расходятся (см. ADR-0008 — собственно ради этого
  # и существует tests/test_ci_parity.py).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--check]

  # ---- Python: mypy (типы) ----
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10
          - sqlalchemy>=2.0
          - types-python-dateutil
        args: [--config-file=pyproject.toml]
        # Постепенный onboarding: пока запускаем только на packages/services с готовыми типами.
        files: ^(packages|services)/.+\.py$
        exclude: ^(.*/tests/|.*/samples/)

  # ---- JS/TS: biome ----
  - repo: https://github.com/biomejs/pre-commit
    rev: v1.9.4
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@1.9.4"]

  # ---- Секреты ----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            pnpm-lock\.yaml|
            uv\.lock|
            .*\.min\.(js|css)|
            packages/gedcom-parser/samples/.*
          )$

  # ---- Markdown ----
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json, --fix]
        exclude: ^(\.github/|node_modules/)

  # ---- Conventional Commits ----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, build, ci]

  # ---- i18n: raw English JSX guard (Phase 4.13 / ADR-0037) ----
  # Custom regex hook flagging raw English text nodes in authenticated-route
  # .tsx files. Lightweight (no plugin install) — see scripts/check_i18n_strings.py
  # for scope, allowlists and known limitations.
  - repo: local
    hooks:
      - id: check-i18n-strings
        name: check-i18n-strings (Phase 4.13)
        entry: python scripts/check_i18n_strings.py
        language: system
        files: ^apps/web/src/(app/(dashboard|persons|dna|sources|hypotheses|familysearch|settings|trees)/.+|components/(site-header|notification-bell|error-message))\.tsx$
        types: [file]

  # ---- design-system: lucide allowlist (DS-2 / ADR-0067 §«Enforcement» A) ----
  # Per-name import restriction для `lucide-react`. Biome 1.9.x не умеет
  # `importNames`-allowlist, ESLint introduction отвергнут (см. addendum
  # Decision B). Hook — Python regex, паттерн ``check_i18n_strings.py``.
  - repo: local
    hooks:
      - id: check-lucide-allowlist
        name: check-lucide-allowlist (DS-2)
        entry: python scripts/check_lucide_allowlist.py
        language: system
        files: ^apps/(web|landing)/src/.+\.(ts|tsx)$
        exclude: '__tests__/|__fixtures__/'
        types: [file]

  # ---- design-system: anti-patterns (DS-2 / ADR-0067 §«Enforcement» C) ----
  # Mechanical detection: emoji в copy, exclamation marks в JSX/i18n,
  # marketing fluff terms, heavy shadow utilities, dark-mode artifacts.
  # Judgment-grade нарушения (medallion frames в кастомных SVG, drop-shadow
  # как emphasis в taken stylesheet) — design-debt issues.
  - repo: local
    hooks:
      - id: check-design-anti-patterns
        name: check-design-anti-patterns (DS-2)
        entry: python scripts/check_design_anti_patterns.py
        language: system
        files: ^apps/(web|landing)/(src/.+\.(ts|tsx|css)|messages/.+\.json)$
        exclude: '__tests__/|__fixtures__/'
        types: [file]

  # ---- pnpm lockfile freshness guard ----
  # Срабатывает только когда staged один из (apps/*/package.json, pnpm-lock.yaml,
  # pnpm-workspace.yaml). Запускает `pnpm install --frozen-lockfile` — если
  # specifier'ы в package.json разошлись с lockfile'ом, hook падает с
  # ERR_PNPM_OUTDATED_LOCKFILE. Это ловит сценарий из #126: добавили
  # idb-keyval / react-error-boundary в package.json без `pnpm install`,
  # lockfile остался без них, локальный `pnpm install --frozen-lockfile` падает.
  - repo: local
    hooks:
      - id: pnpm-lockfile-fresh
        name: pnpm lockfile freshness
        entry: pnpm install --frozen-lockfile --silent
        language: system
        files: ^(apps/[^/]+/package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)$
        pass_filenames: false
