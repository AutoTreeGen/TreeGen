# =============================================================================
# pre-commit hooks для AutoTreeGen.
# Установка:  uv run pre-commit install
# Прогон:     uv run pre-commit run --all-files
# https://pre-commit.com
# =============================================================================

default_language_version:
  python: python3.13

default_stages: [pre-commit]

repos:
  # ---- Базовые проверки ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: '^.*\.jsonc$'
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # ---- Python: ruff (lint + format) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---- Python: black (двойная подстраховка форматирования) ----
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100, --target-version=py313]

  # ---- Python: mypy (типы) ----
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10
          - types-python-dateutil
        args: [--config-file=pyproject.toml]
        # Постепенный onboarding: пока запускаем только на packages/services с готовыми типами.
        files: ^(packages|services)/.+\.py$
        exclude: ^(.*/tests/|.*/samples/)

  # ---- JS/TS: biome ----
  - repo: https://github.com/biomejs/pre-commit
    rev: v1.9.4
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@1.9.4"]

  # ---- Секреты ----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            pnpm-lock\.yaml|
            uv\.lock|
            .*\.min\.(js|css)|
            packages/gedcom-parser/samples/.*
          )$

  # ---- Markdown ----
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json, --fix]
        exclude: ^(\.github/|node_modules/)

  # ---- Conventional Commits ----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, build, ci]
