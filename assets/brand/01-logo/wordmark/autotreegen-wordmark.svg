<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="AutoTreeGen wordmark">
  <title>AutoTreeGen</title>
  <defs>
    <linearGradient id="atg-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B2D8C"/>
      <stop offset="62%" stop-color="#4B2D8C"/>
      <stop offset="100%" stop-color="#2E5DA5"/>
    </linearGradient>
    <style>
      /* Шрифт-стек намеренно содержит fallback'и: Montserrat — основной;
         если у потребителя нет Montserrat, остаются Inter / system-ui.
         Для production-печати ассета (когда нет гарантии шрифта)
         следует сконвертировать текст в outlined paths в Figma/Illustrator. */
      .atg-word {
        font-family: "Montserrat", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 800;
        font-size: 48px;
        letter-spacing: -0.48px;
        fill: url(#atg-word);
      }
    </style>
  </defs>
  <text x="0" y="48" class="atg-word">AutoTreeGen</text>
</svg>
