<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadow elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{
    margin:0;padding:48px 28px;background:var(--color-bg);font-family:var(--font-sans);
    display:flex;gap:28px;
  }
  .b{display:flex;flex-direction:column;align-items:center;gap:12px;flex:1}

  /* — 3D box —
     Card body has its own internal depth (gradient + inset highlight + inset shadow).
     The drop-shadow underneath is what scales per elevation level — that's the
     point of the spec: same card, raised more from the page. */
  .box{
    width:100%;height:96px;
    background:linear-gradient(180deg,#FFFFFF 0%, #F8F4FB 100%);
    border:1px solid #C7B9D2;
    border-radius:12px;
    position:relative;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 -1px 0 rgba(44,16,84,0.05);
  }
  /* Internal glassy highlight — same on every elevation level */
  .box::before{
    content:"";position:absolute;left:1px;right:1px;top:1px;height:50%;
    background:linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
    border-radius:11px 11px 0 0;
    pointer-events:none;
  }

  /* Elevation levels — only the OUTER drop shadow scales.
     Each step dramatically increases hover height + spread + softness. */
  .e-none{
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 -1px 0 rgba(44,16,84,0.05);
  }
  .e-sm{
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 -1px 0 rgba(44,16,84,0.05),
      0 1px 2px rgba(44,16,84,0.10),
      0 3px 6px -2px rgba(44,16,84,0.12);
  }
  .e-md{
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 -1px 0 rgba(44,16,84,0.05),
      0 2px 4px rgba(44,16,84,0.12),
      0 8px 16px -4px rgba(44,16,84,0.20);
    transform:translateY(-2px);
  }
  .e-lg{
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.95),
      inset 0 -1px 0 rgba(44,16,84,0.05),
      0 4px 8px rgba(44,16,84,0.14),
      0 16px 32px -6px rgba(44,16,84,0.28),
      0 24px 48px -12px rgba(44,16,84,0.18);
    transform:translateY(-5px);
  }

  .name{
    font-family:var(--font-display);font-size:13px;font-weight:700;
    color:#1a0d2e;letter-spacing:-0.005em;
  }
  .lab{
    font-family:var(--font-mono);font-size:10px;color:var(--color-fg-muted);
    letter-spacing:0.04em;text-transform:uppercase;
    text-align:center;
  }
</style></head><body>
  <div class="b"><div class="box e-none"></div><span class="name">none</span><span class="lab">flat surfaces</span></div>
  <div class="b"><div class="box e-sm"></div><span class="name">shadow-sm</span><span class="lab">cards at rest</span></div>
  <div class="b"><div class="box e-md"></div><span class="name">shadow-md</span><span class="lab">hover · sticky</span></div>
  <div class="b"><div class="box e-lg"></div><span class="name">shadow-lg</span><span class="lab">modals only</span></div>
</body></html>
