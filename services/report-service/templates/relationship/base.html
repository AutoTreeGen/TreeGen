<!doctype html>
<html lang="{{ ctx.locale }}">
<head>
<meta charset="utf-8">
<title>{{ report_title(ctx.title_style, ctx.locale) }} — {{ ctx.person_a.primary_name }} & {{ ctx.person_b.primary_name }}</title>
<style>
  /* Phase 24.3: тонкая адаптация Phase 15.6 base.html — A4, Times, Chicago footnotes,
     signature block, footnote section. См. ADR-0073 §"Visual layout reuse". */
  @page {
    size: A4;
    margin: 24mm 18mm;
    @bottom-right {
      content: counter(page) " / " counter(pages);
      font-size: 9pt;
      color: #555;
    }
  }
  body {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 11pt;
    color: #111;
    line-height: 1.45;
  }
  h1 { font-size: 22pt; margin: 0 0 4mm 0; font-weight: normal; letter-spacing: 0.02em; }
  h2 { font-size: 14pt; margin: 8mm 0 2mm 0; border-bottom: 1px solid #888; padding-bottom: 1mm; font-weight: normal; }
  h3 { font-size: 11pt; margin: 4mm 0 1mm 0; font-weight: bold; }
  p, li { margin: 1mm 0; }
  table { border-collapse: collapse; width: 100%; margin: 2mm 0 4mm 0; font-size: 10pt; }
  th, td { border: 1px solid #888; padding: 1.5mm 2mm; text-align: left; vertical-align: top; }
  th { background: #eee; font-weight: bold; }
  .title-page { page-break-after: always; padding-top: 30mm; }
  .title-page .meta { margin-top: 18mm; font-size: 11pt; color: #333; }
  .title-page .meta dt { font-weight: bold; margin-top: 2mm; }
  .title-page .meta dd { margin: 0 0 0 0; }
  .signature-page { page-break-before: always; }
  .signature-block { margin-top: 18mm; padding: 6mm; border: 1px solid #000; }
  .signature-block .line { border-bottom: 1px solid #000; height: 6mm; margin-top: 8mm; }
  .footnotes { font-size: 9pt; color: #222; margin-top: 6mm; border-top: 1px solid #ccc; padding-top: 3mm; }
  .footnote-list { padding-left: 6mm; }
  .narrative p { text-align: justify; margin: 2mm 0; }
  .provenance dt { font-weight: bold; }
  .provenance dd { margin: 0 0 1mm 4mm; }
  .badge {
    display: inline-block;
    padding: 0.4mm 1.5mm;
    font-size: 9pt;
    border: 1px solid #555;
    border-radius: 1mm;
    margin-left: 1.5mm;
  }
  .conf-bayesian { background: #e8f0fe; }
  .conf-naive    { background: #fff7d6; }
  .conf-asserted { background: #fde2e2; }
  .negative      { color: #7a1d1d; }
  sup { font-size: 0.75em; vertical-align: super; line-height: 0; }
</style>
</head>
{% from "_macros.html" import footnote_sup, evidence_row, provenance_block with context %}
<body>
{% block content %}{% endblock %}
</body>
</html>
