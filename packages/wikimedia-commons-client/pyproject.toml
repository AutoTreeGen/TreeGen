# =====================================================================
# wikimedia-commons-client — клиент Wikimedia Commons MediaWiki Action
# API (Phase 9.1). Анонимный read-only доступ к изображениям мест +
# attribution/license metadata. Без OAuth.
# Архитектурное решение — ADR-0058.
# =====================================================================

[project]
name = "wikimedia-commons-client"
version = "0.1.0"
description = "Read-only клиент Wikimedia Commons (MediaWiki Action API) на httpx + Pydantic v2."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Proprietary" }

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.5",
    "tenacity>=8.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.30",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wikimedia_commons_client"]
