# =====================================================================
# familysearch-client — клиент FamilySearch API (Phase 5.0).
# Поддерживает OAuth 2.0 PKCE flow, GEDCOM-X модели на Pydantic v2,
# retry на 429/503 через tenacity.
# Архитектурное решение — ADR-0011.
# =====================================================================

[project]
name = "familysearch-client"
version = "0.1.0"
description = "Read-only клиент FamilySearch API на httpx + Pydantic v2 (OAuth 2.0 PKCE, GEDCOM-X)"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Proprietary" }

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.5",
    "tenacity>=8.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.30",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/familysearch_client"]
