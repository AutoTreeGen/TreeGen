# =====================================================================
# gedcom-parser — парсер формата GEDCOM 5.5.5
# =====================================================================

[project]
name = "gedcom-parser"
version = "0.1.0"
description = "Robust парсер GEDCOM 5.5.5 с поддержкой проприетарных расширений"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    "pydantic>=2.10.0",
    "typer>=0.12.0",               # CLI
    "rich>=13.9.0",                # подтянется через typer; используется для красивого вывода
    "python-dateutil>=2.9.0",      # понадобится при разборе дат GEDCOM
    "convertdate>=2.4.1",
]

[project.scripts]
gedcom-tool = "gedcom_parser.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gedcom_parser"]
