# =====================================================================
# shared-models — общие Pydantic-модели для всех сервисов
# Заглушка на фазе 1, наполняется в фазе 2.
# =====================================================================

[project]
name = "shared-models"
version = "0.1.0"
description = "Общие Pydantic-модели для сервисов AutoTreeGen"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_models"]
