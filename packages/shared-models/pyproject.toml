# =====================================================================
# shared-models — общие модели данных AutoTreeGen.
#
# Один пакет, два слоя (см. ADR-0003 и docs/data-model.md):
#   - shared_models.orm     — SQLAlchemy 2 async модели (источник правды для БД).
#   - shared_models.schemas — Pydantic v2 DTO (для API и парсера).
# Конвертеры orm <-> pydantic — в shared_models.converters.
# =====================================================================

[project]
name = "shared-models"
version = "0.1.0"
description = "Общие ORM- и Pydantic-модели для сервисов AutoTreeGen"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }

dependencies = [
    "pydantic[email]>=2.10.0",   # [email] — email-validator для EmailStr в UserBase
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "pgvector>=0.3.6",        # для будущих embeddings (Phase 10), импортируем тип сразу — миграция добавит позже
    # UUIDv7 реализован inline в shared_models.types (RFC 9562) — без внешней зависимости.
    # Phase 4.10 (ADR-0033): JWT verification против Clerk JWKS.
    # PyJWT — стандарт-де-факто, плюс crypto[backend] нужно для RS256.
    "pyjwt[crypto]>=2.10.0",
    "httpx>=0.27.0",          # JWKS fetch (тонкий wrapper, async).
]

[project.optional-dependencies]
test = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "testcontainers[postgres]>=4.8",
    "psycopg[binary]>=3.2",
]
# Phase 13.2 — security middleware. slowapi реализует rate-limiting
# поверх Starlette; in-memory storage по умолчанию (см. ADR-0053). Услугу
# импортирует ``shared_models.security.apply_security_middleware``.
security = [
    "slowapi>=0.1.9",
]
# Phase 13.1b — Sentry SDK для consumer-сервисов. Lazy-imported в
# shared_models.observability.init_sentry; без extra `init_sentry` —
# no-op даже если SENTRY_DSN задан.
observability = [
    "sentry-sdk>=2.0",
]
# Phase 4.11a — GDPR export storage backends. Lazy-imported в
# shared_models.storage; устанавливаются по необходимости (CI / dev /
# prod выбирает один). Тесты используют InMemoryStorage без extras.
storage-minio = [
    "boto3>=1.35",     # MinIO + AWS S3 (signature_version="s3v4").
    "anyio>=4.6",      # to_thread.run_sync для sync boto3-клиента.
]
storage-gcs = [
    "google-cloud-storage>=2.18",
    "anyio>=4.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_models"]
