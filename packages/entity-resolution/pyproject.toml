[project]
name = "entity-resolution"
version = "0.1.0"
description = "AutoTreeGen entity resolution — pure-function dedup scoring (Phase 3.4)."
requires-python = ">=3.13"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "AutoTreeGen" }]
# Pure-functions пакет (см. ADR-0015):
#  - rapidfuzz: Levenshtein / token-set / ratio.
#  - pyphonetics: только стандартный Soundex (DaitchMokotoff не
#    экспортируется в 0.5.x — реализован own implementation в
#    phonetic.py, см. ADR-0015 §«Daitch-Mokotoff»).
#  - unidecode: ASCII-fold диакритик для names/transliterate (Phase 15.10 /
#    ADR-0068). Используется только для Polish/German fold; Cyrillic→Latin
#    BGN/ISO9/LOC имеют собственные mapping-таблицы внутри transliterate.py.
#  - transliterate: Cyrillic↔Latin GOST-7.79 round-trip как default Latin-
#    форма для names/transliterate. Multi-standard логика поверх — там же.
# Никаких sqlalchemy / fastapi / httpx — алгоритмы тестируются синтетически
# без БД, переиспользуются в parser-service и будущих сервисах.
dependencies = [
    "rapidfuzz>=3.0",
    "pyphonetics>=0.5.3",
    "transliterate>=1.10",
    "unidecode>=1.3",
]

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/entity_resolution"]

[tool.hatch.metadata]
allow-direct-references = true
