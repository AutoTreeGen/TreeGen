[project]
name = "dna-analysis"
version = "0.0.1"
description = "AutoTreeGen DNA analysis — Phase 6 placeholder."
requires-python = ">=3.13"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "AutoTreeGen" }]
dependencies = []

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dna_analysis"]

[tool.hatch.metadata]
# Пакет в workspace, но реального содержимого ещё нет (Phase 6).
# Когда заполним — поднимем version, опишем dependencies.
allow-direct-references = true
